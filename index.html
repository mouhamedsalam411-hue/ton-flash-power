<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TON Power Recharge</title>

<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:radial-gradient(circle at center,#0f1c2e 0%,#070d18 70%);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
color:white;
}

.glow-bg{
position:absolute;
width:600px;
height:600px;
background:radial-gradient(circle,rgba(0,153,255,0.3),transparent 70%);
border-radius:50%;
animation:pulse 4s infinite alternate;
}

@keyframes pulse{
from{transform:scale(1);opacity:0.6;}
to{transform:scale(1.2);opacity:0.9;}
}

.container{
position:relative;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
padding:40px;
border-radius:25px;
width:90%;
max-width:420px;
box-shadow:0 0 40px rgba(0,153,255,0.4);
border:1px solid rgba(255,255,255,0.1);
z-index:2;
}

h1{
text-align:center;
margin-bottom:30px;
background:linear-gradient(90deg,#00c6ff,#0072ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

input{
width:100%;
padding:14px;
margin-bottom:18px;
border-radius:12px;
border:none;
background:rgba(255,255,255,0.08);
color:white;
font-size:14px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

.connect-btn{
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
margin-bottom:15px;
}

.send-btn{
background:linear-gradient(90deg,#00ffcc,#00cc88);
color:black;
}

.footer{
text-align:center;
margin-top:15px;
font-size:12px;
opacity:0.5;
}
</style>
</head>

<body>

<div class="glow-bg"></div>

<div class="container">
<h1>⚡ Ton Flash Power</h1>

<button class="connect-btn" id="connect">Connect Wallet</button>

<input type="text" id="address" placeholder="Adresse destinataire (UQ...)">
<input type="number" id="amount" placeholder="Montant en TON">

<button class="send-btn" id="send">Envoyer TON</button>

<div class="footer">
Powered by TON Flash Power
</div>
</div>

<script>

const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
manifestUrl: 'https://TON-SITE.github.io/tonconnect-manifest.json'
});

document.getElementById("connect").onclick = async () => {
await tonConnectUI.connectWallet();
};

document.getElementById("send").onclick = async () => {

const address=document.getElementById("address").value;
const amount=document.getElementById("amount").value;

if(!address || !amount){
alert("Remplis adresse et montant !");
return;
}

const transaction={
validUntil:Math.floor(Date.now()/1000)+600,
messages:[{
address:address,
amount:(amount*1000000000).toString()
}]
};

try{
await tonConnectUI.sendTransaction(transaction);
alert("Transaction envoyée !");
}
catch(error){
alert("Erreur: "+error);
}

};

</script>

</body>
</html>
